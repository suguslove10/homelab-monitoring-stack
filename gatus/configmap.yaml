apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config
  namespace: monitoring
  labels:
    app: gatus
data:
  config.yaml: |
    storage:
      type: sqlite
      path: /data/data.db

    ui:
      title: "Sugu's Infrastructure Status"
      description: "Live uptime monitoring for all services"

    endpoints:
      - name: Portfolio
        group: External
        url: https://thesugu.com
        interval: 60s
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 3000"

      - name: Grafana
        group: Infrastructure
        url: https://grafana.thesugu.com
        interval: 60s
        conditions:
          - "[STATUS] == 200"

      - name: ArgoCD
        group: Infrastructure
        url: https://argo.thesugu.com
        interval: 60s
        conditions:
          - "[STATUS] == 200"

      - name: K3s API
        group: Cluster
        url: tcp://kubernetes.default.svc:443
        interval: 30s
        conditions:
          - "[CONNECTED] == true"
