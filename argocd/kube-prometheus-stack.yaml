apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 58.2.2
    helm:
      values: |
        ## Prometheus
        prometheus:
          prometheusSpec:
            retention: 15d
            scrapeInterval: 15s
            evaluationInterval: 15s
            resources:
              requests:
                cpu: 500m
                memory: 512Mi
              limits:
                cpu: "1"
                memory: 2Gi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 50Gi

            ## Scrape kubelets, nodes, pods — all enabled by default
            ## Additional scrape configs for custom targets if needed:
            # additionalScrapeConfigs: []

        ## Grafana
        grafana:
          enabled: true
          adminUser: admin
          adminPassword: admin
          service:
            type: ClusterIP
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt-prod" # Optional: If you use cert-manager for other domains, this will give you automatic HTTPS
            hosts:
              - grafana.thesugu.com
            tls:
              - secretName: grafana-tls
                hosts:
                  - grafana.thesugu.com
          persistence:
            enabled: true
            size: 5Gi
          defaultDashboardsEnabled: true
          defaultDashboardsTimezone: utc

          ## Auto-provision Loki as a datasource
          additionalDataSources:
            - name: Loki
              type: loki
              access: proxy
              url: http://loki-stack.observability.svc.cluster.local:3100
              isDefault: false
              editable: true

          ## Sidecar picks up dashboards from ConfigMaps labeled grafana_dashboard=1
          sidecar:
            dashboards:
              enabled: true
              searchNamespace: observability
            datasources:
              enabled: true

        ## Alertmanager
        alertmanager:
          enabled: true
          alertmanagerSpec:
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ["alertname", "namespace", "job"]
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 4h
              receiver: "default"
              routes:
                - receiver: "critical"
                  matchers:
                    - severity = critical
                  repeat_interval: 1h
                - receiver: "warning"
                  matchers:
                    - severity = warning
                  repeat_interval: 4h
            receivers:
              - name: "default"
                # Uncomment and configure your notification channel:
                # slack_configs:
                #   - api_url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
                #     channel: "#alerts"
              - name: "critical"
                # slack_configs:
                #   - api_url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
                #     channel: "#alerts-critical"
              - name: "warning"
                # slack_configs:
                #   - api_url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
                #     channel: "#alerts"
            inhibit_rules:
              - source_matchers:
                  - severity = critical
                target_matchers:
                  - severity = warning
                equal: ["alertname", "namespace"]

        ## Node Exporter (DaemonSet) — enabled by default
        nodeExporter:
          enabled: true

        ## Kube State Metrics — enabled by default
        kubeStateMetrics:
          enabled: true

        ## Kubelet monitoring — enabled by default
        kubelet:
          enabled: true

        ## Default alert rules — nodes, pods, kubelets, etcd, etc.
        defaultRules:
          create: true
          rules:
            alertmanager: true
            etcd: true
            configReloaders: true
            general: true
            k8s: true
            kubeApiserverAvailability: true
            kubeApiserverBurnrate: true
            kubeApiserverHistogram: true
            kubeApiserverSlos: true
            kubeControllerManager: true
            kubelet: true
            kubeProxy: true
            kubePrometheusGeneral: true
            kubePrometheusNodeRecording: true
            kubernetesApps: true
            kubernetesResources: true
            kubernetesStorage: true
            kubernetesSystem: true
            kubeSchedulerAlerting: true
            kubeSchedulerRecording: true
            kubeStateMetrics: true
            network: true
            node: true
            nodeExporterAlerting: true
            nodeExporterRecording: true
            prometheus: true
            prometheusOperator: true

        ## CRDs — install and manage
        prometheusOperator:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
